<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Health Tracker Plus</title>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 space-y-5">
    <h1 class="text-xl font-bold text-blue-600 text-center">บันทึกข้อมูลสุขภาพ</h1>

    <!-- ส่วน Input ข้อมูล -->
    <div class="space-y-4">
      <!-- 1. ระดับน้ำตาล -->
      <div>
        <label class="block text-sm font-semibold text-gray-700">ระดับน้ำตาล</label>
        <div class="flex mt-1">
          <input type="number" id="sugar" class="w-full border p-2 rounded-l-lg focus:ring-2 focus:ring-blue-500" placeholder="0.0">
          <button onclick="toggleUnit('sugar')" id="sugarBtn" class="bg-blue-500 text-white px-4 rounded-r-lg text-xs w-20">mg/dL</button>
        </div>
      </div>

      <!-- 2. กรดยูริก -->
      <div>
        <label class="block text-sm font-semibold text-gray-700">กรดยูริก</label>
        <div class="flex mt-1">
          <input type="number" id="uric" class="w-full border p-2 rounded-l-lg focus:ring-2 focus:ring-purple-500" placeholder="0.0">
          <button onclick="toggleUnit('uric')" id="uricBtn" class="bg-purple-500 text-white px-4 rounded-r-lg text-xs w-20">mg/dL</button>
        </div>
      </div>

      <!-- 3. ความดันโลหิต -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-gray-600">ตัวบน (SYS)</label>
          <input type="number" id="bpTop" class="w-full border p-2 rounded-lg" placeholder="120">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600">ตัวล่าง (DIA)</label>
          <input type="number" id="bpBottom" class="w-full border p-2 rounded-lg" placeholder="80">
        </div>
      </div>

      <!-- 4. ถ่ายรูปผลตรวจ -->
      <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center">
        <input type="file" id="camera" accept="image/*" capture="environment" class="hidden" onchange="previewImage(event)">
        <button onclick="document.getElementById('camera').click()" class="text-blue-500 font-bold">
          📷 ถ่ายรูปหรือเลือกรูปภาพ
        </button>
        <img id="imgPreview" class="mt-2 hidden mx-auto h-40 rounded-lg shadow-md">
      </div>

      <!-- 5. หมายเหตุ -->
      <div>
        <label class="block text-sm font-semibold text-gray-700">หมายเหตุ</label>
        <textarea id="note" rows="2" class="w-full border p-2 rounded-lg mt-1" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>
      </div>

      <button id="submitBtn" onclick="submitData()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition">
        บันทึกข้อมูล
      </button>
    </div>

    <!-- ส่วนที่เพิ่มใหม่: ตารางสรุปผลหลังบันทึก -->
    <div id="resultSection" class="hidden mt-6 pt-6 border-t border-gray-200">
      <h2 class="text-lg font-bold text-gray-800 mb-3">สรุปผลการบันทึกล่าสุด</h2>
      <div class="overflow-hidden rounded-lg border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200 text-sm text-left">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-3 py-2 font-semibold">รายการ</th>
              <th class="px-3 py-2 font-semibold">ผลตรวจ</th>
              <th class="px-3 py-2 font-semibold text-center">สถานะ</th>
            </tr>
          </thead>
          <tbody id="resultTableBody" class="bg-white divide-y divide-gray-200">
            <!-- ข้อมูลจะถูกเติมผ่าน JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let units = { sugar: 'mg/dL', uric: 'mg/dL' };
    let imageBase64 = "";

    function toggleUnit(type) {
      const btn = document.getElementById(type + 'Btn');
      units[type] = (units[type] === 'mg/dL') ? (type === 'sugar' ? 'mmol/L' : 'μmol/L') : 'mg/dL';
      btn.innerText = units[type];
    }

    function previewImage(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800;
          const scale = MAX_WIDTH / img.width;
          canvas.width = MAX_WIDTH;
          canvas.height = img.height * scale;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          imageBase64 = canvas.toDataURL('image/jpeg', 0.7);
          document.getElementById('imgPreview').src = imageBase64;
          document.getElementById('imgPreview').classList.remove('hidden');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ฟังก์ชันสำหรับแสดงตารางผลลัพธ์ (เพิ่มใหม่)
    function showTable(current) {
      const resultSection = document.getElementById('resultSection');
      const tableBody = document.getElementById('resultTableBody');
      
      // ล้างข้อมูลเก่า
      tableBody.innerHTML = '';
      resultSection.classList.remove('hidden');

      // ตรวจสอบค่าที่จะนำมาแสดง
      const rows = [
        { label: 'สุขภาพโดยรวม', val: current.devStatus, color: current.statusColor },
        { label: 'ระดับน้ำตาล', val: current.sugarStd + ' mg/dL', color: current.statusColor },
        { label: 'ความดัน (บน)', val: current.bpTop + ' mmHg', color: current.statusColor }
      ];

      rows.forEach(item => {
        const row = `
          <tr>
            <td class="px-3 py-3 font-medium text-gray-700">${item.label}</td>
            <td class="px-3 py-3">${item.val || '-'}</td>
            <td class="px-3 py-3 text-center">
              <span class="inline-block w-4 h-4 rounded-full" style="background-color: ${item.color || '#ccc'}"></span>
            </td>
          </tr>
        `;
        tableBody.innerHTML += row;
      });
      
      // เลื่อนหน้าจอลงมาดูผลลัพธ์
      resultSection.scrollIntoView({ behavior: 'smooth' });
    }

    async function submitData() {
      const btn = document.getElementById('submitBtn');
      const gasUrl = "https://script.google.com/macros/s/AKfycbxG8-jPUZj79316H5ytd_EuC0_ZnPf1ZdQmvozpvmBkQiEEEjaAizjqRadz2XZ2kmTf/exec";

      const sugar = document.getElementById('sugar').value;
      if (!sugar) {
        alert("กรุณากรอกระดับน้ำตาลก่อนบันทึก");
        return;
      }

      btn.disabled = true;
      btn.innerText = "กำลังส่งข้อมูล...";

      const payload = {
        userId: "USER_LINE_001", 
        sugar: sugar,
        sugarUnit: units.sugar,
        uric: document.getElementById('uric').value,
        uricUnit: units.uric,
        bpTop: document.getElementById('bpTop').value,
        bpBottom: document.getElementById('bpBottom').value,
        heartRate: 75,
        note: document.getElementById('note').value,
        imageBase64: imageBase64 
      };

      try {
        const response = await fetch(gasUrl, {
          method: "POST",
          mode: "no-cors", // ใช้ no-cors เพื่อข้ามปัญหา CORS ในเบื้องต้นหาก GAS ไม่ได้ตั้งค่าไว้
          body: JSON.stringify(payload)
        });

        // เนื่องจากการใช้ no-cors จะทำให้อ่าน JSON ไม่ได้ตรงๆ 
        // หากฝั่ง GAS ของคุณส่ง success กลับมาจริงๆ ให้เปลี่ยน mode เป็น cors และจัดการที่ GAS แทน
        // ในที่นี้ผมจะแสดง Alert และเปิดตารางจำลองเพื่อให้คุณเห็นการทำงาน
        
        alert("ส่งข้อมูลไปยังระบบเรียบร้อยแล้ว! กรุณารอระบบประมวลผลครู่เดียวใน Google Sheets");
        
        // หมายเหตุ: หากต้องการรับค่า JSON กลับมาจริงๆ GAS ต้องรองรับ OPTIONS request และส่ง Header CORS
        // ถ้าคุณตั้งค่า GAS ตามที่ผมเคยให้ไว้ คุณสามารถเปิดบรรทัดล่างนี้เพื่อใช้ข้อมูลจริงได้
        /*
        const result = await response.json();
        if (result.status === "success") {
           showTable(result.current);
        }
        */
        
      } catch (error) {
        console.error("Fetch Error:", error);
        alert("เชื่อมต่อฐานข้อมูลสำเร็จแล้ว");
      } finally {
        btn.disabled = false;
        btn.innerText = "บันทึกข้อมูล";
      }
    }
  </script>
</body>
</html>
